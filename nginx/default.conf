upstream listing_workstation {
  server listing-workstation:8080;
  keepalive 32;
}

server {
  listen 80 default_server;
  server_name _;

  client_max_body_size 64k;

  location = /nginx-health {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location = / {
    return 302 /listing_workstation/;
  }

  location = /listing_workstation {
    return 301 /listing_workstation/;
  }

  # The trailing slash on proxy_pass removes /listing_workstation/ before the
  # request reaches Node, while the browser keeps one stable project namespace.
  location ^~ /listing_workstation/ {
    proxy_pass http://listing_workstation/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # A DataSuite query can legitimately run for up to ten minutes.
    proxy_connect_timeout 10s;
    proxy_read_timeout 660s;
    proxy_send_timeout 660s;
  }

  location / {
    return 404;
  }
}
