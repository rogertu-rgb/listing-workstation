services:
  listing-workstation:
    build: .
    container_name: listing-workstation
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8080:8080"
    expose:
      - "8080"
    volumes:
      - listing-workstation-data:/app/data

  server-surveillance:
    build:
      context: .
      dockerfile: surveillance/Dockerfile
    container_name: server-surveillance
    restart: unless-stopped
    environment:
      PORT: 8090
      HOST_PROC_ROOT: /host/proc
      LISTING_WORKSTATION_HEALTH_URL: http://listing-workstation:8080/api/health
    expose:
      - "8090"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    volumes:
      - /proc/loadavg:/host/proc/loadavg:ro
      - /proc/meminfo:/host/proc/meminfo:ro
      - /proc/uptime:/host/proc/uptime:ro
      - /proc/net/tcp:/host/proc/net/tcp:ro
      - /proc/net/tcp6:/host/proc/net/tcp6:ro

  nginx:
    image: nginx:1.27-alpine
    container_name: listing-workstation-nginx
    restart: unless-stopped
    depends_on:
      listing-workstation:
        condition: service_healthy
      server-surveillance:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/nginx-health"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3

volumes:
  listing-workstation-data:
