services:
  listing-workstation:
    build: .
    container_name: listing-workstation
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8080:8080"
    expose:
      - "8080"
    volumes:
      - listing-workstation-data:/app/data

  nginx:
    image: nginx:1.27-alpine
    container_name: listing-workstation-nginx
    restart: unless-stopped
    depends_on:
      listing-workstation:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/nginx-health"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3

volumes:
  listing-workstation-data:
